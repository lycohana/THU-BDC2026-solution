services:
  app:
    image: bdc2026:latest
    pull_policy: never
    volumes:
      - ./app/data:/app/data
      - ./app/output:/app/output
      - ./app/temp:/app/temp
    working_dir: /app
    command: bash -c "python app/code/src/test.py"
    runtime: nvidia
    environment:
      - BDC_DATA_FILE=/app/model/input/train_hs300_latest.csv
      - BDC_OUTPUT_PATH=/app/output/result.csv
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    privileged: true
    mem_limit: 16g
    memswap_limit: 16g
    cpus: 10.0
